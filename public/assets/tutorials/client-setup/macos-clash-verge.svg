<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #111827; }
      .title { font-size: 32px; font-weight: 760; }
      .body { font-size: 20px; fill: #475569; }
      .small { font-size: 16px; fill: #64748b; }
      .window { fill: #fff; filter: url(#shadow); }
      .sidebar { fill: #111827; }
      .blue { fill: #2563eb; }
      .card { fill: #f8fafc; stroke: #dbe3ef; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#f6f8fb"/>
  <text x="64" y="68" class="title">macOS Clash Verge Rev 导入订阅</text>
  <text x="64" y="106" class="body">下载对应芯片的 dmg，拖入 Applications，然后在 Profiles 中导入 URL。</text>

  <rect x="90" y="154" width="1020" height="540" rx="28" class="window"/>
  <circle cx="132" cy="192" r="8" fill="#ef4444"/>
  <circle cx="160" cy="192" r="8" fill="#f59e0b"/>
  <circle cx="188" cy="192" r="8" fill="#10b981"/>
  <rect x="90" y="218" width="1020" height="1" fill="#e5e7eb"/>
  <rect x="90" y="219" width="230" height="475" rx="0" class="sidebar"/>
  <text x="130" y="286" font-size="23" font-weight="760" fill="#fff">Clash Verge</text>
  <rect x="120" y="340" width="170" height="44" rx="12" fill="#1e293b"/>
  <text x="150" y="368" font-size="18" fill="#fff">Profiles</text>
  <rect x="120" y="404" width="170" height="44" rx="12" fill="#0f172a"/>
  <text x="150" y="432" font-size="18" fill="#cbd5e1">Proxies</text>

  <text x="370" y="286" font-size="28" font-weight="760">新建 URL 配置</text>
  <rect x="370" y="330" width="680" height="82" rx="18" class="card"/>
  <text x="408" y="380" class="body">名称：{{siteName}}</text>
  <rect x="370" y="446" width="680" height="118" rx="18" class="card"/>
  <text x="408" y="496" class="body">订阅 URL</text>
  <text x="408" y="530" class="small">{{subscribeUrl}}</text>
  <rect x="846" y="598" width="204" height="54" rx="17" class="blue"/>
  <text x="916" y="633" font-size="22" font-weight="760" fill="#fff">保存</text>
</svg>
