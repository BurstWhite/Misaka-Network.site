<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #111827; }
      .title { font-size: 32px; font-weight: 760; }
      .body { font-size: 20px; fill: #475569; }
      .small { font-size: 16px; fill: #64748b; }
      .window { fill: #fff; filter: url(#shadow); }
      .sidebar { fill: #111827; }
      .blue { fill: #2563eb; }
      .card { fill: #f8fafc; stroke: #dbe3ef; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#f6f8fb"/>
  <text x="64" y="68" class="title">Clash Verge Rev 导入订阅</text>
  <text x="64" y="106" class="body">在 Profiles 中新建 URL 配置，填入本站订阅链接。</text>

  <rect x="76" y="150" width="1048" height="550" rx="24" class="window"/>
  <rect x="76" y="150" width="230" height="550" rx="24" class="sidebar"/>
  <circle cx="116" cy="188" r="8" fill="#ef4444"/>
  <circle cx="144" cy="188" r="8" fill="#f59e0b"/>
  <circle cx="172" cy="188" r="8" fill="#10b981"/>
  <text x="116" y="256" font-size="23" font-weight="760" fill="#fff">Clash Verge</text>
  <rect x="106" y="318" width="170" height="44" rx="12" fill="#1e293b"/>
  <text x="136" y="346" font-size="18" fill="#fff">Profiles</text>
  <rect x="106" y="382" width="170" height="44" rx="12" fill="#0f172a"/>
  <text x="136" y="410" font-size="18" fill="#cbd5e1">Proxies</text>

  <text x="354" y="232" font-size="28" font-weight="760">Profiles</text>
  <rect x="924" y="196" width="130" height="48" rx="14" class="blue"/>
  <text x="962" y="226" font-size="19" font-weight="760" fill="#fff">New</text>
  <rect x="354" y="284" width="700" height="86" rx="18" class="card"/>
  <text x="386" y="326" class="body">{{siteName}}</text>
  <text x="386" y="354" class="small">URL Profile · 等待更新</text>

  <rect x="354" y="418" width="700" height="206" rx="18" fill="#fff" stroke="#dbe3ef" stroke-width="2"/>
  <text x="396" y="474" class="body">Type</text>
  <rect x="530" y="444" width="430" height="46" rx="12" fill="#eef2ff"/>
  <text x="556" y="474" class="body">URL</text>
  <text x="396" y="548" class="body">URL</text>
  <rect x="530" y="516" width="430" height="62" rx="12" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="556" y="552" class="small">{{subscribeUrl}}</text>
</svg>
