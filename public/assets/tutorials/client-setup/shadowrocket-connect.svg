<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #111827; }
      .title { font-size: 32px; font-weight: 760; }
      .body { font-size: 20px; fill: #475569; }
      .small { font-size: 16px; fill: #64748b; }
      .phone { fill: #0f172a; filter: url(#shadow); }
      .screen { fill: #f8fafc; }
      .card { fill: #fff; stroke: #e5e7eb; stroke-width: 2; }
      .green { fill: #10b981; }
      .blue { fill: #2563eb; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#f6f8fb"/>
  <text x="64" y="68" class="title">Shadowrocket 开启连接</text>
  <text x="64" y="106" class="body">选择节点，打开顶部开关，首次使用时允许添加 VPN 配置。</text>

  <rect x="92" y="148" width="330" height="562" rx="42" class="phone"/>
  <rect x="116" y="184" width="282" height="492" rx="30" class="screen"/>
  <text x="146" y="236" font-size="27" font-weight="760">Shadowrocket</text>
  <rect x="148" y="270" width="218" height="58" rx="29" fill="#d1fae5"/>
  <circle cx="335" cy="299" r="24" class="green"/>
  <text x="158" y="305" class="body">Connected</text>
  <rect x="148" y="372" width="218" height="54" rx="14" class="card"/>
  <circle cx="176" cy="399" r="10" class="green"/>
  <text x="198" y="406" class="body">香港 01</text>
  <text x="308" y="406" class="small">32ms</text>
  <rect x="148" y="446" width="218" height="54" rx="14" class="card"/>
  <circle cx="176" cy="473" r="10" fill="#cbd5e1"/>
  <text x="198" y="480" class="body">日本 02</text>
  <text x="308" y="480" class="small">88ms</text>
  <rect x="148" y="548" width="218" height="54" rx="14" fill="#eef2ff" stroke="#bfdbfe"/>
  <text x="184" y="582" class="body">允许 VPN 配置</text>

  <rect x="514" y="186" width="600" height="420" rx="28" fill="#fff" filter="url(#shadow)"/>
  <text x="574" y="260" font-size="28" font-weight="760">连接检查</text>
  <circle cx="600" cy="330" r="12" class="green"/>
  <text x="632" y="337" class="body">选择延迟较低的节点</text>
  <circle cx="600" cy="398" r="12" class="green"/>
  <text x="632" y="405" class="body">打开顶部连接开关</text>
  <circle cx="600" cy="466" r="12" class="green"/>
  <text x="632" y="473" class="body">首次弹窗点击允许</text>
  <circle cx="600" cy="534" r="12" class="blue"/>
  <text x="632" y="541" class="body">状态栏出现 VPN 标识后完成</text>
</svg>
