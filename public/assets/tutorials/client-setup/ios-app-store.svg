<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #111827; }
      .title { font-size: 32px; font-weight: 760; }
      .body { font-size: 20px; fill: #475569; }
      .small { font-size: 16px; fill: #64748b; }
      .phone { fill: #111827; filter: url(#shadow); }
      .screen { fill: #f8fafc; }
      .bar { fill: #e5e7eb; }
      .blue { fill: #2563eb; }
      .red { fill: #ef4444; }
      .green { fill: #10b981; }
      .step { fill: #fff; stroke: #dbe3ef; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#f6f8fb"/>
  <text x="62" y="68" class="title">iOS 外区 Apple ID 下载流程</text>
  <text x="62" y="106" class="body">只在 App Store 登录提供的账号，下载完成后退出，切勿登录 iCloud。</text>

  <rect x="90" y="150" width="300" height="560" rx="42" class="phone"/>
  <rect x="112" y="184" width="256" height="492" rx="28" class="screen"/>
  <rect x="198" y="166" width="86" height="8" rx="4" fill="#374151"/>
  <text x="140" y="236" font-size="28" font-weight="760">App Store</text>
  <circle cx="328" cy="225" r="24" class="blue"/>
  <text x="316" y="233" font-size="19" font-weight="800" fill="#fff">ID</text>
  <rect x="138" y="282" width="202" height="46" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <text x="160" y="312" class="body">退出当前账号</text>
  <rect x="138" y="352" width="202" height="46" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <text x="160" y="382" class="body">登录提供 Apple ID</text>
  <rect x="138" y="422" width="202" height="46" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <text x="160" y="452" class="body">搜索 Shadowrocket</text>
  <rect x="138" y="520" width="202" height="58" rx="18" class="blue"/>
  <text x="190" y="557" font-size="22" font-weight="760" fill="#fff">获取 / 下载</text>
  <text x="146" y="628" class="small">下载后退出外区账号</text>

  <rect x="464" y="168" width="660" height="130" rx="18" class="step"/>
  <circle cx="518" cy="232" r="28" class="blue"/>
  <text x="509" y="242" font-size="26" font-weight="800" fill="#fff">1</text>
  <text x="568" y="220" font-size="25" font-weight="760">打开 App Store 头像</text>
  <text x="568" y="258" class="body">滑到底部退出当前 App Store 账号，再登录提供的外区账号。</text>

  <rect x="464" y="330" width="660" height="130" rx="18" class="step"/>
  <circle cx="518" cy="394" r="28" class="green"/>
  <text x="509" y="404" font-size="26" font-weight="800" fill="#fff">2</text>
  <text x="568" y="382" font-size="25" font-weight="760">下载 Shadowrocket</text>
  <text x="568" y="420" class="body">搜索 App 名称，或在 Safari 打开官方 App Store 链接。</text>

  <rect x="464" y="492" width="660" height="130" rx="18" class="step"/>
  <circle cx="518" cy="556" r="28" class="red"/>
  <text x="509" y="566" font-size="26" font-weight="800" fill="#fff">3</text>
  <text x="568" y="544" font-size="25" font-weight="760">下载完成后退出</text>
  <text x="568" y="582" class="body">不要登录 iCloud，不要改密码，不要绑定手机号或付款方式。</text>
</svg>
