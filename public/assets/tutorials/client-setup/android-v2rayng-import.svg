<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #111827; }
      .title { font-size: 32px; font-weight: 760; }
      .body { font-size: 20px; fill: #475569; }
      .small { font-size: 16px; fill: #64748b; }
      .phone { fill: #111827; filter: url(#shadow); }
      .screen { fill: #f8fafc; }
      .card { fill: #fff; stroke: #e5e7eb; stroke-width: 2; }
      .blue { fill: #2563eb; }
      .green { fill: #10b981; }
      .line { stroke: #94a3b8; stroke-width: 4; stroke-linecap: round; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#f6f8fb"/>
  <text x="64" y="68" class="title">v2rayNG 导入订阅</text>
  <text x="64" y="106" class="body">进入订阅分组设置，添加 URL，保存后更新订阅。</text>

  <rect x="86" y="148" width="320" height="562" rx="42" class="phone"/>
  <rect x="110" y="184" width="272" height="492" rx="30" class="screen"/>
  <rect x="110" y="184" width="272" height="70" rx="30" class="blue"/>
  <text x="142" y="228" font-size="26" font-weight="760" fill="#fff">v2rayNG</text>
  <text x="340" y="228" font-size="30" fill="#fff">⋮</text>
  <rect x="140" y="300" width="214" height="52" rx="12" class="card"/>
  <text x="162" y="334" class="body">订阅分组设置</text>
  <rect x="140" y="382" width="214" height="52" rx="12" class="card"/>
  <text x="162" y="416" class="body">更新订阅</text>
  <circle cx="338" cy="606" r="28" class="green"/>
  <text x="326" y="616" font-size="26" font-weight="760" fill="#fff">▶</text>

  <line x1="424" y1="330" x2="506" y2="330" class="line"/>
  <path d="M492 310 L518 330 L492 350" fill="none" class="line"/>

  <rect x="542" y="158" width="578" height="524" rx="28" fill="#fff" filter="url(#shadow)"/>
  <text x="596" y="230" font-size="28" font-weight="760">新增订阅分组</text>
  <text x="596" y="302" class="body">备注</text>
  <rect x="724" y="272" width="330" height="50" rx="12" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="750" y="304" class="small">{{siteName}}</text>
  <text x="596" y="392" class="body">地址</text>
  <rect x="724" y="362" width="330" height="82" rx="12" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="750" y="394" class="small">{{subscribeUrl}}</text>
  <text x="750" y="420" class="small">粘贴完整订阅链接</text>
  <rect x="850" y="542" width="204" height="54" rx="17" class="blue"/>
  <text x="920" y="577" font-size="22" font-weight="760" fill="#fff">保存</text>
</svg>
