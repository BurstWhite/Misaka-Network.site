<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Arial, sans-serif; fill: #111827; }
      .title { font-size: 32px; font-weight: 760; }
      .body { font-size: 20px; fill: #475569; }
      .small { font-size: 16px; fill: #64748b; }
      .phone { fill: #0f172a; filter: url(#shadow); }
      .screen { fill: #f8fafc; }
      .line { stroke: #94a3b8; stroke-width: 4; stroke-linecap: round; }
      .blue { fill: #2563eb; }
      .card { fill: #fff; stroke: #e5e7eb; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1200" height="760" fill="#f6f8fb"/>
  <text x="64" y="68" class="title">Shadowrocket 添加订阅</text>
  <text x="64" y="106" class="body">使用 Subscribe 类型导入本站订阅链接，保存后更新订阅。</text>

  <rect x="78" y="148" width="314" height="562" rx="42" class="phone"/>
  <rect x="101" y="184" width="268" height="492" rx="30" class="screen"/>
  <text x="132" y="236" font-size="27" font-weight="760">Shadowrocket</text>
  <circle cx="330" cy="227" r="23" class="blue"/>
  <text x="322" y="237" font-size="28" font-weight="500" fill="#fff">+</text>
  <rect x="130" y="284" width="210" height="48" rx="12" class="card"/>
  <text x="152" y="315" class="body">节点列表</text>
  <rect x="130" y="356" width="210" height="48" rx="12" class="card"/>
  <text x="152" y="387" class="body">订阅配置</text>

  <line x1="400" y1="226" x2="500" y2="226" class="line"/>
  <path d="M486 206 L512 226 L486 246" fill="none" class="line"/>

  <rect x="536" y="148" width="584" height="562" rx="28" fill="#fff" filter="url(#shadow)"/>
  <text x="590" y="220" font-size="28" font-weight="760">Add Server</text>
  <text x="590" y="280" class="body">Type</text>
  <rect x="760" y="250" width="280" height="48" rx="12" fill="#eef2ff"/>
  <text x="786" y="281" class="body">Subscribe</text>
  <text x="590" y="360" class="body">Remark</text>
  <rect x="760" y="330" width="280" height="48" rx="12" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="786" y="361" class="small">{{siteName}}</text>
  <text x="590" y="440" class="body">URL</text>
  <rect x="760" y="410" width="280" height="76" rx="12" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="786" y="440" class="small">{{subscribeUrl}}</text>
  <text x="786" y="466" class="small">粘贴完整订阅链接</text>
  <rect x="836" y="560" width="204" height="54" rx="17" class="blue"/>
  <text x="900" y="595" font-size="22" font-weight="760" fill="#fff">Done</text>
</svg>
